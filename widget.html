<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Widget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet"/>
<style>
  /* ── Widget Launcher Button ── */
  #chat-launcher {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #111;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.22);
    z-index: 9999;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  #chat-launcher:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 32px rgba(0,0,0,0.28);
  }
  #chat-launcher svg { transition: opacity 0.2s; }

  /* ── Chat Window ── */
  #chat-window {
    position: fixed;
    bottom: 96px;
    right: 28px;
    width: 360px;
    height: 520px;
    background: #0e0e0e;
    border-radius: 20px;
    box-shadow: 0 12px 60px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9998;
    font-family: 'DM Sans', sans-serif;
    transform: scale(0.92) translateY(16px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.2s ease;
    border: 1px solid rgba(255,255,255,0.07);
  }
  #chat-window.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* Header */
  #chat-header {
    padding: 18px 20px 16px;
    background: #111;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chat-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e8ff47, #7affb2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .chat-header-info { flex: 1; }
  .chat-header-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .chat-header-status {
    font-size: 11px;
    color: #7affb2;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 1px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #7affb2;
    display: inline-block;
  }

  /* Messages */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  #chat-messages::-webkit-scrollbar { width: 4px; }
  #chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    animation: msgIn 0.22s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.bot {
    background: #1c1c1c;
    color: #e8e8e8;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .msg.user {
    background: #e8ff47;
    color: #111;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
    background: #1c1c1c;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .typing-dot {
    width: 6px; height: 6px;
    background: #555;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); background: #e8ff47; }
  }

  /* Input area */
  #chat-input-area {
    padding: 12px 14px;
    background: #111;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #chat-input {
    flex: 1;
    background: #1c1c1c;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 14px;
    color: #e8e8e8;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  #chat-input::placeholder { color: #444; }
  #chat-input:focus { border-color: rgba(232,255,71,0.3); }
  #chat-send {
    width: 38px;
    height: 38px;
    background: #e8ff47;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.15s;
  }
  #chat-send:hover { background: #d4eb3a; transform: scale(1.05); }
  #chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Mobile */
  @media (max-width: 420px) {
    #chat-window { width: calc(100vw - 32px); right: 16px; bottom: 88px; }
    #chat-launcher { right: 16px; bottom: 16px; }
  }
</style>
</head>
<body>

<!-- Launcher button -->
<button id="chat-launcher" onclick="toggleChat()" aria-label="Open chat">
  <svg id="icon-chat" width="24" height="24" fill="none" viewBox="0 0 24 24">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <svg id="icon-close" width="20" height="20" fill="none" viewBox="0 0 24 24" style="display:none">
    <path d="M18 6L6 18M6 6l12 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
</button>

<!-- Chat window -->
<div id="chat-window">
  <div id="chat-header">
    <div class="chat-avatar">🤖</div>
    <div class="chat-header-info">
      <div class="chat-header-name">AI Assistant</div>
      <div class="chat-header-status"><span class="status-dot"></span> Online</div>
    </div>
  </div>

  <div id="chat-messages">
    <!-- Initial greeting -->
  </div>

  <div id="chat-input-area">
    <textarea id="chat-input" placeholder="Type a message…" rows="1"></textarea>
    <button id="chat-send" onclick="sendMessage()" aria-label="Send">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const API_URL = "https://YOUR-PROJECT.vercel.app/api/chat"; // 👈 Replace after deploying to Vercel
  // ────────────────────────────────────────────────────────

  let isOpen = false;
  let isLoading = false;
  let messageHistory = [];

  function toggleChat() {
    isOpen = !isOpen;
    document.getElementById("chat-window").classList.toggle("open", isOpen);
    document.getElementById("icon-chat").style.display = isOpen ? "none" : "block";
    document.getElementById("icon-close").style.display = isOpen ? "block" : "none";
    if (isOpen && messageHistory.length === 0) addBotMessage("Hi! 👋 How can I help you today?");
  }

  function addBotMessage(text) {
    const el = document.createElement("div");
    el.className = "msg bot";
    el.textContent = text;
    document.getElementById("chat-messages").appendChild(el);
    scrollToBottom();
  }

  function addUserMessage(text) {
    const el = document.createElement("div");
    el.className = "msg user";
    el.textContent = text;
    document.getElementById("chat-messages").appendChild(el);
    scrollToBottom();
  }

  function showTyping() {
    const el = document.createElement("div");
    el.className = "typing-indicator";
    el.id = "typing";
    el.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    document.getElementById("chat-messages").appendChild(el);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  function scrollToBottom() {
    const msgs = document.getElementById("chat-messages");
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("chat-input");
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = "";
    input.style.height = "auto";
    isLoading = true;
    document.getElementById("chat-send").disabled = true;

    addUserMessage(text);
    messageHistory.push({ role: "user", content: text });

    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: messageHistory }),
      });

      const data = await res.json();
      hideTyping();

      if (data.reply) {
        addBotMessage(data.reply);
        messageHistory.push({ role: "assistant", content: data.reply });
      } else {
        addBotMessage("Sorry, something went wrong. Please try again.");
      }
    } catch (err) {
      hideTyping();
      addBotMessage("Connection error. Please check your setup.");
    }

    isLoading = false;
    document.getElementById("chat-send").disabled = false;
    input.focus();
  }

  // Auto-resize textarea & send on Enter
  document.getElementById("chat-input").addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  document.getElementById("chat-input").addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 100) + "px";
  });
</script>
</body>
</html>
